name: Deploy Backend To Azure App Service

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'server/**'
      - '.github/workflows/azure-app-service.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install Server Dependencies
        run: npm ci
        working-directory: server

      - name: Build Server
        run: npm run build
        working-directory: server

      - name: Trim To Production Dependencies
        run: npm prune --omit=dev
        working-directory: server

      - name: Prepare Deployment Package
        shell: bash
        run: |
          rm -rf deploy
          mkdir -p deploy
          cp -R server/dist deploy/dist
          cp server/package.json deploy/package.json
          cp server/package-lock.json deploy/package-lock.json
          cp -R server/node_modules deploy/node_modules

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-package
          path: deploy

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    environment:
      name: production
    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-package
          path: deploy

      - name: Deploy To Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_APP_SERVICE_NAME }}
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE }}
          package: deploy
